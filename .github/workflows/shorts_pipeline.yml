name: Shorts Pipeline

on:
  schedule:
    # Runs twice a day: 09:00 and 18:00 UTC. Adjust to your audience's peak hours.
    - cron: "0 9 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: {}  # allows manual trigger from the Actions tab

permissions:
  contents: write  # needed to git push the state files back

jobs:
  run-shorts-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg (required by moviepy/whisper)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
         python -m pip install --upgrade pip setuptools wheel
         pip install -r requirements.txt

      - name: Restore cached binary assets (audio/video chunks)
        uses: actions/cache@v4
        with:
          path: assets/
          key: shorts-assets-${{ github.run_id }}
          restore-keys: |
            shorts-assets-

      - name: Run Shorts pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}  
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }} 
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

        run: python orchestrator_shorts.py

      - name: Commit and push state files (text only — never binaries)
        run: |
          git config user.name "yt-automation-bot"
          git config user.email "actions@github.com"
          git add pipeline_state/job_state.json pipeline_state/published_log.json
          git diff --staged --quiet || git commit -m "chore: update shorts pipeline state [skip ci]"
          git pull origin main --rebase
          git push
